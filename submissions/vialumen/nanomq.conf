# ARRA-MQ — NanoMQ Configuration
# Ethereum-signed MQTT broker

listeners.tcp {
  bind = "0.0.0.0:1883"
}

listeners.ws {
  bind = "0.0.0.0:8083"
}

listeners.ssl {
  bind = "0.0.0.0:8883"
  keyfile = "/etc/nanomq/server.key"
  certfile = "/etc/nanomq/server.crt"
}

# HTTP auth webhook — verify Ethereum signatures
auth {
  allow_anonymous = false
  http_auth {
    auth_req {
      url = "http://localhost:3000/auth"
      method = "POST"
      headers.content-type = "application/json"
    }
    acl_req {
      url = "http://localhost:3000/acl"
      method = "POST"
      headers.content-type = "application/json"
    }
  }
}

