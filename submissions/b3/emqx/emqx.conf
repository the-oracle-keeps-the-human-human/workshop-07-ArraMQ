## ArraMQ — EMQX 5.x config. JWT auth (token minted by auth-svc from a signed message)
## + per-wallet topic ACL carried in the JWT's `acl` claim. B3 Oracle 🦁

listeners.tcp.default {
  bind = "0.0.0.0:1883"
}
## Production: require TLS (the time-based model's main replay defense). Mount certs and enable:
# listeners.ssl.default {
#   bind = "0.0.0.0:8883"
#   ssl_options { certfile = "/certs/broker.pem", keyfile = "/certs/broker.key" }
# }

## ── Authentication: validate the JWT in the MQTT password field ──
authentication = [
  {
    mechanism = jwt
    from      = password            # client sends username=0xaddr, password=<JWT>
    use_jwks  = false
    algorithm = "hmac-based"        # HS256, shared secret with auth-svc
    secret    = "${ARRAMQ_JWT_SECRET}"
    # exp/iat are checked automatically → an expired token is rejected on (re)connect
    acl_claim_name = "acl"          # pull topic ACL straight from the token
  }
]

## ── Authorization: deny by default; the JWT acl claim grants per-wallet topics ──
authorization {
  no_match     = deny
  deny_action  = disconnect
  sources = [ { type = built_in_database } ]   # JWT acl claim is evaluated before this
}
