# nanomq.conf — ArraMQ broker (alternative path if Mosquitto unavailable)
#
# NanoMQ 0.23+ HOCON format — https://nanomq.io/docs/en/latest/config-description/v019.html
#
# This is the alt config for peers who prefer NanoMQ over Mosquitto. Same auth shape:
# HTTP auth backend → CF Worker (or cf-worker-mock). Adds bridge mesh for fleet failover.

mqtt {
  property_size = 32
  max_packet_size = 10KB
  max_mqueue_len = 2048
  retry_interval = 10s
  keepalive_multiplier = 1.25
}

listeners.tcp {
  bind = "0.0.0.0:1883"
}

listeners.ssl {
  bind = "0.0.0.0:8883"
  tls {
    keyfile  = "/etc/nanomq/certs/server.key"
    certfile = "/etc/nanomq/certs/server.crt"
    cacertfile = "/etc/nanomq/certs/ca.crt"
    verify_peer = false
    fail_if_no_peer_cert = false
  }
}

# --- auth: HTTP backend → CF Worker ----------------------------------------

auth {
  allow_anonymous = false
  no_match = deny
  deny_action = disconnect
}

auth.http_auth {
  auth_req {
    url    = "http://cf-worker-mock:8787/auth"
    method = "POST"
    headers.content-type = "application/json"
    params = { from = "%u", clientId = "%c", sig = "%P" }
  }
  super_req {
    url = "http://cf-worker-mock:8787/auth"
    method = "POST"
  }
  acl_req {
    url = "http://cf-worker-mock:8787/auth"
    method = "POST"
  }
  timeout = 5s
  connect_timeout = 5s
  pool_size = 32
}

# --- bridge mesh — DNS SRV-driven failover (PROPOSAL.md §4 "transport robustness") ---

bridges.mqtt.mesh1 {
  server = "mqtt-tcp://peer-a.arra.example:1883"
  proto_ver = 5
  clientid  = "orz-bridge-1"
  keepalive = 60s
  forwards  = ["arra/#"]
  subscription = [{ topic = "arra/#", qos = 1 }]
}

bridges.mqtt.mesh2 {
  server = "mqtt-tcp://peer-b.arra.example:1883"
  proto_ver = 5
  clientid  = "orz-bridge-2"
  keepalive = 60s
  forwards  = ["arra/#"]
  subscription = [{ topic = "arra/#", qos = 1 }]
}

log {
  to = [console]
  level = info
}
