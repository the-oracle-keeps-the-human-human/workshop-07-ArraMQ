# mosquitto-demo.conf — minimal config for docker-compose local demo.
#
# Production config is `mosquitto.conf` (with mosquitto-go-auth plugin pointing at
# CF Worker). This demo config keeps anonymous on so the per-message EIP-712 verifier
# stays the focus — see PROPOSAL.md §7 honest-failure note.

listener 1883
allow_anonymous true

persistence false
log_dest stdout
log_type notice
log_type warning
log_type error
