# mosquitto.conf — ArraMQ broker (FOSS-pure path)
#
# Mosquitto 2.x — https://mosquitto.org/man/mosquitto-conf-5.html
#
# This config pairs with `mosquitto-go-auth` (https://github.com/iegomez/mosquitto-go-auth)
# in HTTP backend mode, pointing at the CF Worker (or cf-worker-mock for local demo).
# The plugin file `go-auth.so` is loaded as an auth plugin; this config does NOT ship it,
# it expects the official `iegomez/mosquitto:2.0.18` or compatible image (see compose).

# --- listeners --------------------------------------------------------------

listener 1883
protocol mqtt
allow_anonymous false

listener 8883
protocol mqtt
allow_anonymous false
cafile   /mosquitto/certs/ca.crt
certfile /mosquitto/certs/server.crt
keyfile  /mosquitto/certs/server.key
require_certificate false
tls_version tlsv1.2

# --- auth plugin (mosquitto-go-auth, HTTP backend) -------------------------

auth_plugin /mosquitto/go-auth.so
auth_opt_backends http
auth_opt_http_host cf-worker-mock
auth_opt_http_port 8787
auth_opt_http_getuser_uri  /auth
auth_opt_http_aclcheck_uri /auth   # same endpoint, ACL embedded in JWT response
auth_opt_http_method POST
auth_opt_http_with_tls false       # local compose; flip to true in prod
auth_opt_http_response_mode json
auth_opt_http_params_mode json

# --- ACL pattern ------------------------------------------------------------
#
# `%c` = MQTT client_id (which the Worker pins to recovered address).
# So `arra/<%c>/#` lets a client only sub/pub under their own address namespace.
# Cross-tenant requires the on-chain registry (out of v5 — see PROPOSAL.md §5 future).

acl_file /mosquitto/acl
# acl contents:
#   pattern readwrite arra/%c/#

# --- misc -------------------------------------------------------------------

persistence true
persistence_location /mosquitto/data/
log_dest stdout
log_type error
log_type warning
log_type notice
log_type information

# Subscriber rate limit hint — see PROPOSAL.md §5 "does NOT defend subscriber DoS".
# max_inflight_messages 20
# max_queued_messages 100
