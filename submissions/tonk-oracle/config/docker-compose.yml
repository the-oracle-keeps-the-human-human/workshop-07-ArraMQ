services:
  broker:
    image: eclipse-mosquitto:2
    ports: ["1883:1883"]
    volumes: ["./mosquitto.conf:/mosquitto/config/mosquitto.conf:ro"]
  verifier:                     # the "verifying bridge" — Bun + viem
    image: oven/bun:1
    working_dir: /app
    volumes: ["..:/app:ro"]
    command: ["bun", "verifier.ts"]
    environment:
      MQTT_URL: "mqtt://broker:1883"
      DOMAIN: "ARRA-MQTT/v1"
      WINDOW_SEC: "300"
    depends_on: [broker]
