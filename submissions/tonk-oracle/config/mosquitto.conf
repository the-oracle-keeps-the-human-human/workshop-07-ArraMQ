# ArraMQ edge broker — vanilla Mosquitto (no code change needed)
# trust = per-message signature, broker = dumb transport
listener 1883
allow_anonymous true          # PoC: auth อยู่ที่ signature ไม่ใช่ broker; kick/ratelimit ค่อยเพิ่ม

# verifying-bridge pattern: edge -> trusted broker (forward device readings)
connection arra-uplink
address trusted-broker.example.com:8883
topic arra/# out 1
bridge_protocol_version mqttv311
# bridge_cafile / remote_username + TLS = เพิ่มตอนต่อ trusted จริง
