services:
  broker:
    image: eclipse-mosquitto:2
    ports:
      - "1883:1883"
    volumes:
      - ./mosquitto.conf:/mosquitto/config/mosquitto.conf
      - mosquitto-data:/mosquitto/data

  publisher:
    image: oven/bun:1
    working_dir: /app
    volumes:
      - .:/app
    environment:
      BROKER: mqtt://broker:1883
      PRIVATE_KEY: "0xYOUR_PRIVATE_KEY_HERE"
    command: bun run publisher.ts
    depends_on: [broker]

  subscriber:
    image: oven/bun:1
    working_dir: /app
    volumes:
      - .:/app
    environment:
      BROKER: mqtt://broker:1883
    command: bun run subscriber.ts
    depends_on: [broker]

volumes:
  mosquitto-data:
