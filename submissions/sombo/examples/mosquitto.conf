# ARRA-MQ — Mosquitto config (edge node)
# No auth plugin needed — security is in message signatures

listener 1883
allow_anonymous true

# Persistence
persistence true
persistence_location /mosquitto/data/

# Logging
log_dest stdout
log_type all

# ----- BRIDGE TO CENTRAL HUB (optional) -----
# Uncomment to bridge this edge broker → central ARRA-MQ hub
#
# connection arra-hub
# address hub.arramq.example.com:1883
# topic sensor/# out 0        # forward sensor data up
# topic control/# in 0        # receive control commands from hub
# bridge_attempt_unsubscribe false
# restart_timeout 10
