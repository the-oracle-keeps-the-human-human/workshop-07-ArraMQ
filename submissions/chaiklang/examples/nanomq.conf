# ARRA-MQ edge: NanoMQ bridge -> central EMQX (aggregate device traffic)
bridges.mqtt.to_emqx {
  server   = "mqtts://emqx:8883"
  username = "edge-gw-1"          # static service cred (bridge = 1 client)
  password = "${EDGE_BRIDGE_PW}"
  ssl { enable = true }
  forwards     = ["sensors/#"]                       # edge -> cloud
  subscription = [{ topic = "cmd/#", qos = 1 }]      # cloud -> edge
}
