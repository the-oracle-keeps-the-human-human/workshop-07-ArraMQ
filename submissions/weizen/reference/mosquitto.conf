# ArraMQ PoC — Mosquitto vanilla config
# PoC: allow_anonymous เพราะ trust อยู่ที่ E2E signature (broker = relay)
# production: ปิด anonymous + ใช้ mosquitto-go-auth (SIWE time-based -> JWT) ที่ชั้น connect

listener 1883
listener 9001
protocol websockets      # MQTT over WS (ผ่าน Cloudflare proxy ได้ = DDoS + TLS + hide origin)

allow_anonymous true
persistence false
log_type warning

# --- bridge (decentralized mesh) ตัวอย่าง — เปิดเมื่อต่อหลาย broker ---
# connection arramq-edge-to-cloud
# address tls://<peer-or-emqx-cloud>:8883
# topic sensors/# out 1
# try_private true          # ให้ remote รู้ว่าเป็น bridge -> retained propagate ถูก + กัน loop ดีขึ้น
# remote_username <user>
# remote_password <pass>
