# ==============================================================================
# ARRA-MQ — NanoMQ HTTP Authentication Webhook Configuration Example
# ==============================================================================

# Enable HTTP Webhook Authentication for inbound clients connecting to the broker.
# This auth proxy checks connection-level credentials (e.g. SIWE signature or token)
# at the edge before authorizing access.

auth {
  http {
    # URL of the verification worker (Cloudflare Worker or Bun API)
    url = "https://arra-mq-auth.ora.workers.dev/auth"
    
    # HTTP method to use for the webhook request
    method = post
    
    # Headers to send with the authentication webhook request
    headers {
      "Content-Type" = "application/json"
      "X-Broker-Source" = "ARRA-MQ-Edge-01"
    }
    
    # Connection timeout duration
    timeout = "5s"
    
    # Re-authentication interval for active clients
    reauth_interval = "1h"
    
    # Enable TLS verification if the auth endpoint uses HTTPS
    tls {
      verify_peer = true
    }
  }
}

# General MQTT Configuration
mqtt {
  # Bind address and port
  listeners.tcp.default = "0.0.0.0:1883"
  
  # Max packet size supported
  max_packet_size = 1MB
}
