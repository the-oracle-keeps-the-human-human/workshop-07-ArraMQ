services:
  emqx:
    image: emqx/emqx:5.8.3
    container_name: arramq-emqx
    ports:
      - "1883:1883"    # MQTT
      - "8883:8883"    # MQTTS (TLS)
      - "18083:18083"  # Dashboard
    environment:
      - EMQX_AUTHENTICATION__1__MECHANISM=password_based
      - EMQX_AUTHENTICATION__1__BACKEND=http
      - EMQX_AUTHENTICATION__1__URL=http://auth:3000/auth
      - EMQX_AUTHENTICATION__1__METHOD=post
      - EMQX_AUTHENTICATION__1__HEADERS__content-type=application/json
      - EMQX_AUTHENTICATION__1__BODY={"username":"${username}","password":"${password}","clientid":"${clientid}"}
      # ACL from auth response
      - EMQX_AUTHORIZATION__SOURCES__1__TYPE=http
      - EMQX_AUTHORIZATION__SOURCES__1__URL=http://auth:3000/acl
    depends_on:
      - auth

  auth:
    image: oven/bun:1
    container_name: arramq-auth
    working_dir: /app
    volumes:
      - .:/app
    command: bun run connect_auth.ts
    environment:
      - CHAIN_ID=20260619

  redis:
    image: redis:7-alpine
    container_name: arramq-redis
    ports:
      - "6379:6379"
