# =================================================================
# Local Edge Listener Configuration
# =================================================================
listener 1883 0.0.0.0
allow_anonymous true

# =================================================================
# Bridge Configuration to Central EMQX Hub
# =================================================================
connection emqx-hub-bridge
address emqx-hub.arramq.org:8883

# Bridge Protocol Version (MQTT v5.0 preferred)
bridge_protocol_version mqttv50

# Clean session behavior
cleansession false

# Reconnect interval
start_type automatic
restart_timeout 10

# TLS Configuration for secure bridge transit
bridge_capath /etc/ssl/certs
bridge_insecure false

# =================================================================
# Topic Mappings (local_topic direction remote_topic)
# =================================================================
# 1. Forward edge sensor readings outwards (Outbound only)
topic sensor/no10/# out 1

# 2. Receive commands for actuators inwards (Inbound only)
topic control/no10/# in 1
