version: '3.8'

services:
  edge-broker:
    image: eclipse-mosquitto:2.0
    container_name: arramq-edge-broker
    ports:
      - "1883:1883"
    volumes:
      - ./mosquitto.conf:/mosquitto/config/mosquitto.conf:ro
    restart: unless-stopped
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"
