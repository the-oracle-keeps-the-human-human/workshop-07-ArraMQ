## ArraMQ — EMQX 5.x: HTTP auth backend + ACL + TLS listener
authentication = [
  { mechanism = password_based
    backend   = http
    method    = post
    url       = "http://auth:8080/mqtt/auth"
    body      = { clientid = "${clientid}", username = "${username}", password = "${password}" }
    headers   { "content-type" = "application/json" }
    # auth service returns {"result":"allow","acl":[...]} → EMQX applies the per-address ACL
  }
]

## TLS is mandatory (the signed credential is replayable within MAX_AGE)
listeners.ssl.default {
  bind = "0.0.0.0:8883"
  ssl_options { certfile = "/certs/server.crt", keyfile = "/certs/server.key" }
}

## fallback ACL: deny anything outside the signer's own namespace
authorization {
  no_match = deny
  sources  = [ { type = built_in_database } ]
}
