## ArraMQ v2 — EMQX 5.x: Layer-1 connect HTTP auth + per-address ACL + TLS
authentication = [
  { mechanism = password_based
    backend   = http
    method    = post
    url       = "http://auth:8080/mqtt/auth"
    body      = { username = "${username}", password = "${password}" }
    headers   { "content-type" = "application/json" }
    # auth service returns {"result":"allow","acl":[...]} -> EMQX applies the per-address ACL
  }
]

## TLS mandatory (connect credential is replayable within MAX_AGE)
listeners.ssl.default {
  bind = "0.0.0.0:8883"
  ssl_options { certfile = "/certs/server.crt", keyfile = "/certs/server.key" }
}

## fallback ACL: deny anything outside the signer's own namespace
authorization { no_match = deny, sources = [ { type = built_in_database } ] }

## NOTE: per-message integrity (topic-binding + payload hash + monotonic seq) is
## NOT done here — it is enforced E2E by verifier.py at subscribers / a verifying
## bridge, against Redis. The broker stays a transport for the message layer.
