# EMQX Webhook Authentication Configuration Example (v5.x)
# Save this in your EMQX configuration directory or configure via Dashboard

authentication = [
  {
    backend = "http"
    mechanism = "password_based"
    method = "post"
    url = "http://localhost:3000/api/auth"
    headers {
      "content-type" = "application/json"
    }
    body {
      username = "${username}"
      password = "${password}"
      clientid = "${clientid}"
      ipaddress = "${peerhost}"
    }
    # Connection pool configuration
    pool_size = 8
    enable_pipelining = true
    connect_timeout = "5s"
  }
]

# Topic Access Control List (ACL) Webhook Configuration Example
authorization {
  sources = [
    {
      type = "http"
      method = "post"
      url = "http://localhost:3000/api/acl"
      headers {
        "content-type" = "application/json"
      }
      body {
        username = "${username}"
        clientid = "${clientid}"
        topic = "${topic}"
        action = "${action}" # publish | subscribe
      }
    }
  ]
}
