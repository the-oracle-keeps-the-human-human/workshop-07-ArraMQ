# Mosquitto vanilla — ARRA-MQ PoC
# broker เป็นแค่ "ท่อเปล่า": ไม่มี auth ที่ broker, ไม่มี plugin
# trust ทั้งหมดอยู่ในลายเซ็น EIP-712 ของข้อความ (verify ที่ subscriber)
#
# prod: ใส่ TLS + mosquitto-go-auth (JWT/SIWE) สำหรับ connect-spam guard
# แต่ integrity/authenticity ของ "ข้อความ" ไม่พึ่ง broker เลย

listener 1883
allow_anonymous true
